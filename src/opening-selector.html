<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px;
      color: #f5ead4;
      background:
        radial-gradient(circle at 50% 0%, rgba(176, 42, 36, .28), transparent 52%),
        linear-gradient(145deg, #15100e, #241713 58%, #100d0c);
      font-family: "Microsoft YaHei", system-ui, sans-serif;
    }
    .hyxhn-opening-shell {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: clamp(18px, 4vw, 34px);
      border: 1px solid rgba(225, 185, 112, .42);
      border-radius: 18px;
      background: rgba(19, 13, 11, .88);
      box-shadow: 0 16px 42px rgba(0, 0, 0, .4), inset 0 0 38px rgba(133, 44, 29, .1);
    }
    .hyxhn-opening-kicker {
      margin: 0 0 7px;
      color: #d9b46f;
      font-size: 12px;
      letter-spacing: .28em;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-family: "STKaiti", "KaiTi", serif;
      font-size: clamp(27px, 7vw, 44px);
      font-weight: 600;
      text-align: center;
    }
    .hyxhn-opening-lead {
      max-width: 560px;
      margin: 12px auto 22px;
      color: #cdbfac;
      line-height: 1.75;
      text-align: center;
    }
    .hyxhn-opening-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(230px, 100%), 1fr));
      gap: 13px;
    }
    .hyxhn-opening-button {
      appearance: none;
      width: 100%;
      min-height: 126px;
      padding: 17px;
      border: 1px solid rgba(225, 185, 112, .36);
      border-radius: 14px;
      color: inherit;
      background: linear-gradient(135deg, rgba(92, 31, 25, .74), rgba(35, 23, 19, .9));
      text-align: left;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .hyxhn-opening-button:hover,
    .hyxhn-opening-button:focus-visible {
      transform: translateY(-2px);
      border-color: #e3bd75;
      background: linear-gradient(135deg, rgba(124, 39, 30, .86), rgba(45, 28, 22, .95));
      outline: none;
    }
    .hyxhn-opening-button:disabled { opacity: .58; cursor: wait; transform: none; }
    .hyxhn-opening-title {
      display: block;
      margin-bottom: 8px;
      color: #f6d79c;
      font-family: "STKaiti", "KaiTi", serif;
      font-size: 21px;
    }
    .hyxhn-opening-description { display: block; color: #cfc2b2; font-size: 13px; line-height: 1.65; }
    .hyxhn-opening-tip { margin: 17px 0 0; color: #927f6e; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <main class="hyxhn-opening-shell">
    <p class="hyxhn-opening-kicker">狐妖小红娘 · 王权篇</p>
    <h1>选择故事起点</h1>
    <p class="hyxhn-opening-lead">每个起点都会载入独立的剧情状态。选择完成后，故事正文与 MVU 初始变量将一同切换。</p>
    <div class="hyxhn-opening-grid">
      <button class="hyxhn-opening-button" type="button" data-swipe-id="1">
        <span class="hyxhn-opening-title">演武场 · 道门兵人</span>
        <span class="hyxhn-opening-description">从故事序章开始。暮色将临，一缕蛛丝正在王权山庄墙外悄然掠过。</span>
      </button>
      <button class="hyxhn-opening-button" type="button" data-swipe-id="2">
        <span class="hyxhn-opening-title">主殿 · 父命召见</span>
        <span class="hyxhn-opening-description">从相知后的危机开始。父亲命{{user}}即刻前往主殿，清瞳却在今夜失约。</span>
      </button>
    </div>
    <p class="hyxhn-opening-tip" data-opening-status>请选择一个开局；选择后如需更换，请新建聊天。</p>
  </main>
  <script>
    $(() => {
      const buttons = Array.from(document.querySelectorAll('[data-swipe-id]'));
      const status = document.querySelector('[data-opening-status]');
      buttons.forEach(button => button.addEventListener('click', async () => {
        buttons.forEach(item => { item.disabled = true; });
        status.textContent = '正在载入开局与 MVU 初始变量……';
        try {
          await eventEmit('hyxhn_opening_selected', Number(button.dataset.swipeId));
        } catch (error) {
          console.error('[王权篇开局页] 选择失败。', error);
          status.textContent = '载入失败，请重载脚本后新建聊天。';
          buttons.forEach(item => { item.disabled = false; });
        }
      }));
    });
  </script>
</body>
</html>
